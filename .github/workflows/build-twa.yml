name: Build TWA (Android APK/AAB)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'
      version_name:
        description: 'Version name'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias mandarin-master \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore $GITHUB_WORKSPACE/mandarin-master.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=Mandarin Master, OU=Apps, O=MandarinMaster, L=Unknown, ST=Unknown, C=US"

      - name: Extract SHA-256 fingerprint
        id: fingerprint
        run: |
          FINGERPRINT=$(keytool -list -v \
            -keystore $GITHUB_WORKSPACE/mandarin-master.keystore \
            -alias mandarin-master \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "sha256=$FINGERPRINT" >> $GITHUB_OUTPUT
          echo "::notice::SHA-256 Fingerprint: $FINGERPRINT"

      - name: Resize app icons for Android densities
        run: |
          sudo apt-get install -y imagemagick > /dev/null 2>&1

          # Use icon from the repo (already checked out)
          ICON="icons/icon-512.png"
          file "$ICON"

          # Resize to proper Android mipmap densities
          for density_size in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${density_size%%:*}"
            size="${density_size##*:}"
            dir="twa/app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert "$ICON" -resize "${size}x${size}" "$dir/ic_launcher.png"
            echo "Created ${density} icon (${size}x${size})"
          done

      - name: Create TWA Android project
        env:
          FINGERPRINT: ${{ steps.fingerprint.outputs.sha256 }}
          KEYSTORE_PATH: ${{ github.workspace }}/mandarin-master.keystore
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          VERSION_CODE: ${{ inputs.version_code }}
          VERSION_NAME: ${{ inputs.version_name }}
        run: |
          cd twa

          # --- settings.gradle ---
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MandarinMaster"
          include ':app'
          EOF

          # --- build.gradle (root) ---
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          # --- gradle.properties ---
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # --- app/build.gradle ---
          cat > app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'app.netlify.mandarin_master.twa'
              compileSdk 34

              defaultConfig {
                  applicationId "app.netlify.mandarin_master.twa"
                  minSdk 19
                  targetSdk 34
                  versionCode ${VERSION_CODE}
                  versionName "${VERSION_NAME}"

                  manifestPlaceholders = [
                      hostName: "mandarin-master.netlify.app",
                      defaultUrl: "https://mandarin-master.netlify.app",
                      launcherName: "Mandarin Master",
                      assetStatements: '[{ "relation": ["delegate_permission/common.handle_all_urls"], "target": { "namespace": "android_app", "package_name": "app.netlify.mandarin_master.twa", "sha256_cert_fingerprints": ["${FINGERPRINT}"] } }]'
                  ]
              }

              signingConfigs {
                  release {
                      storeFile file("${KEYSTORE_PATH}")
                      storePassword "${KEYSTORE_PASS}"
                      keyAlias "mandarin-master"
                      keyPassword "${KEYSTORE_PASS}"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # --- AndroidManifest.xml ---
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="${launcherName}"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.LauncherActivity">

                  <meta-data
                      android:name="asset_statements"
                      android:value='${assetStatements}' />

                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true"
                      android:label="${launcherName}">

                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="${defaultUrl}" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:resource="@color/navigationColor" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                          android:resource="@mipmap/ic_launcher" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:resource="@color/backgroundColor" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.SCREEN_ORIENTATION"
                          android:value="portrait" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https" android:host="${hostName}" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # --- Resource files ---
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0f1520</color>
              <color name="colorPrimaryDark">#0f1520</color>
              <color name="navigationColor">#0f1520</color>
              <color name="backgroundColor">#0f1520</color>
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Mandarin Master</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LauncherActivity" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/backgroundColor</item>
              </style>
          </resources>
          EOF

      - name: Build APK and AAB
        working-directory: twa
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

          echo "Building release APK..."
          gradle assembleRelease

          echo "Building release AAB..."
          gradle bundleRelease || true

          echo "=== Build outputs ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find twa -name "*.apk" -exec cp {} artifacts/ \; 2>/dev/null || true
          find twa -name "*.aab" -exec cp {} artifacts/ \; 2>/dev/null || true
          cp $GITHUB_WORKSPACE/mandarin-master.keystore artifacts/
          echo "=== Artifacts ==="
          ls -la artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-apk
          path: artifacts/*.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-aab
          path: artifacts/*.aab
          if-no-files-found: warn

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: artifacts/mandarin-master.keystore
          retention-days: 3

      - name: Build Summary
        run: |
          echo "## TWA Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** app.netlify.mandarin_master.twa" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version_name }} (${{ inputs.version_code }})" >> $GITHUB_STEP_SUMMARY
          echo "**SHA-256:** \`${{ steps.fingerprint.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Download APK/AAB from artifacts above" >> $GITHUB_STEP_SUMMARY
          echo "2. Update .well-known/assetlinks.json with fingerprint" >> $GITHUB_STEP_SUMMARY
          echo "3. Upload to Google Play, Amazon, Huawei" >> $GITHUB_STEP_SUMMARY
