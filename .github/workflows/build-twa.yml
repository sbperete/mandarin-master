name: Build TWA (Android APK/AAB)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'
      version_name:
        description: 'Version name'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias mandarin-master \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore $GITHUB_WORKSPACE/mandarin-master.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=Mandarin Master, OU=Apps, O=MandarinMaster, L=Unknown, ST=Unknown, C=US"

      - name: Extract SHA-256 fingerprint
        id: fingerprint
        run: |
          FINGERPRINT=$(keytool -list -v \
            -keystore $GITHUB_WORKSPACE/mandarin-master.keystore \
            -alias mandarin-master \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "sha256=$FINGERPRINT" >> $GITHUB_OUTPUT
          echo "::notice::SHA-256 Fingerprint: $FINGERPRINT"

      - name: Download app icon
        run: |
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xhdpi
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/app/src/main/res/mipmap-mdpi
          curl -sL "https://mandarin-master.netlify.app/icons/icon-512.png" -o icon-512.png
          # Copy icon to all densities (simple approach — same icon, Android handles scaling)
          cp icon-512.png twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp icon-512.png twa/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon-512.png twa/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon-512.png twa/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon-512.png twa/app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Create TWA Android project
        run: |
          cd twa

          # --- settings.gradle ---
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolution {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MandarinMaster"
          include ':app'
          EOF

          # --- build.gradle (root) ---
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          # --- gradle.properties ---
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # --- app/build.gradle ---
          mkdir -p app
          cat > app/build.gradle << APPEOF
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'app.netlify.mandarin_master.twa'
              compileSdk 34

              defaultConfig {
                  applicationId "app.netlify.mandarin_master.twa"
                  minSdk 19
                  targetSdk 34
                  versionCode ${{ inputs.version_code }}
                  versionName "${{ inputs.version_name }}"

                  manifestPlaceholders = [
                      hostName: "mandarin-master.netlify.app",
                      defaultUrl: "https://mandarin-master.netlify.app",
                      launcherName: "Mandarin Master",
                      assetStatements: '[{ "relation": ["delegate_permission/common.handle_all_urls"], "target": { "namespace": "android_app", "package_name": "app.netlify.mandarin_master.twa", "sha256_cert_fingerprints": ["${{ steps.fingerprint.outputs.sha256 }}"] } }]'
                  ]
              }

              signingConfigs {
                  release {
                      storeFile file("$GITHUB_WORKSPACE/mandarin-master.keystore")
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                      keyAlias "mandarin-master"
                      keyPassword "${{ secrets.KEYSTORE_PASSWORD }}"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          APPEOF

          # --- AndroidManifest.xml ---
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <application
                  android:name="android.app.Application"
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="${launcherName}"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.LauncherActivity">

                  <meta-data
                      android:name="asset_statements"
                      android:value='${assetStatements}' />

                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true"
                      android:label="${launcherName}">

                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="${defaultUrl}" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:resource="@color/navigationColor" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                          android:resource="@mipmap/ic_launcher" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:resource="@color/backgroundColor" />

                      <meta-data
                          android:name="android.support.customtabs.trusted.SCREEN_ORIENTATION"
                          android:value="portrait" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https" android:host="${hostName}" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # --- res/values/colors.xml ---
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/colors.xml << 'COLORS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0f1520</color>
              <color name="colorPrimaryDark">#0f1520</color>
              <color name="navigationColor">#0f1520</color>
              <color name="backgroundColor">#0f1520</color>
          </resources>
          COLORS

          # --- res/values/strings.xml ---
          cat > app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Mandarin Master</string>
          </resources>
          STRINGS

          # --- res/values/styles.xml ---
          cat > app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LauncherActivity" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/backgroundColor</item>
                  <item name="android:statusBarColor">@color/colorPrimary</item>
                  <item name="android:navigationBarColor">@color/navigationColor</item>
              </style>
          </resources>
          STYLES

          echo "=== TWA project structure ==="
          find . -type f | head -30

      - name: Setup Gradle wrapper
        working-directory: twa
        run: |
          # Download Gradle wrapper
          gradle wrapper --gradle-version=8.5 2>/dev/null || {
            # If gradle isn't available, create wrapper manually
            mkdir -p gradle/wrapper
            curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle/wrapper/gradle-8.5-bin.zip
            cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

            # Download and create gradlew script
            curl -sL "https://raw.githubusercontent.com/nicolo-ribaudo/nicolo-ribaudo/master/gradlew" -o gradlew 2>/dev/null || {
              cat > gradlew << 'GRADLEW'
          #!/bin/sh
          APP_BASE_NAME=$(basename "$0")
          APP_HOME=$(cd "$(dirname "$0")" && pwd -P)
          DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          exec java $DEFAULT_JVM_OPTS -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
            }
            chmod +x gradlew

            # Download gradle wrapper jar
            curl -sL "https://github.com/nicolo-ribaudo/nicolo-ribaudo/raw/main/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || {
              # Use gradle init to create proper wrapper
              export SDKMAN_DIR="$HOME/.sdkman"
              curl -s "https://get.sdkman.io" | bash 2>/dev/null || true
              source "$HOME/.sdkman/bin/sdkman-init.sh" 2>/dev/null || true
              sdk install gradle 8.5 2>/dev/null || true
              gradle wrapper 2>/dev/null || true
            }
          }

      - name: Build with Gradle
        working-directory: twa
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "Building release APK..."
            ./gradlew assembleRelease 2>&1

            echo "Building release AAB..."
            ./gradlew bundleRelease 2>&1 || true
          else
            echo "::error::Gradle wrapper not available"
            exit 1
          fi

          echo "=== Build outputs ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find twa -name "*.apk" -exec cp {} artifacts/ \; 2>/dev/null || true
          find twa -name "*.aab" -exec cp {} artifacts/ \; 2>/dev/null || true
          cp $GITHUB_WORKSPACE/mandarin-master.keystore artifacts/
          echo "=== Final artifacts ==="
          ls -la artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-apk
          path: artifacts/*.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-aab
          path: artifacts/*.aab
          if-no-files-found: warn

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: artifacts/mandarin-master.keystore
          retention-days: 3

      - name: Build Summary
        run: |
          echo "## TWA Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** app.netlify.mandarin_master.twa" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version_name }} (${{ inputs.version_code }})" >> $GITHUB_STEP_SUMMARY
          echo "**SHA-256:** \`${{ steps.fingerprint.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          ls artifacts/ 2>/dev/null | while read f; do echo "- $f"; done >> $GITHUB_STEP_SUMMARY
