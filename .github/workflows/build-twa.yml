name: Build TWA (Android APK/AAB)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'
      version_name:
        description: 'Version name'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias mandarin-master \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore $GITHUB_WORKSPACE/mandarin-master.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=Mandarin Master, OU=Apps, O=MandarinMaster, L=Unknown, ST=Unknown, C=US"

      - name: Extract SHA-256 fingerprint
        id: fingerprint
        run: |
          FINGERPRINT=$(keytool -list -v \
            -keystore $GITHUB_WORKSPACE/mandarin-master.keystore \
            -alias mandarin-master \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "sha256=$FINGERPRINT" >> $GITHUB_OUTPUT
          echo "::notice::SHA-256 Fingerprint: $FINGERPRINT"

      - name: Install and configure Bubblewrap CLI
        run: |
          npm install -g @bubblewrap/cli

          # Pre-configure bubblewrap with JDK and SDK paths to skip interactive prompts
          mkdir -p ~/.nicolo-nicolo/nicolo-bubblewrap
          cat > ~/.nicolo-nicolo/nicolo-bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          EOF

          # Also write to bubblewrap's actual config location
          bubblewrap updateConfig \
            --jdkPath="$JAVA_HOME" \
            --androidSdkPath="/usr/local/lib/android/sdk" 2>&1 || true

          echo "Config written. Checking:"
          cat ~/.nicolo-nicolo/nicolo-bubblewrap/config.json 2>/dev/null || true
          find ~ -name "config.json" -path "*bubblewrap*" 2>/dev/null || true

      - name: Initialize TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

          # Use yes to answer any remaining prompts with 'y'
          yes | bubblewrap init \
            --manifest="https://mandarin-master.netlify.app/manifest.json" \
            --directory=. 2>&1 || true

          echo "=== Project files after init ==="
          ls -la
          echo "=== Check for gradlew ==="
          [ -f "gradlew" ] && echo "gradlew found!" || echo "No gradlew"
          [ -f "app/build.gradle" ] && echo "app/build.gradle found!" || echo "No app/build.gradle"
          [ -f "twaManifest.json" ] && echo "twaManifest.json found!" || echo "No twaManifest.json"

      - name: Build with Gradle
        working-directory: twa-build
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

          if [ -f "gradlew" ]; then
            echo "Building with Gradle..."
            chmod +x gradlew

            # Build signed APK
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/mandarin-master.keystore \
              -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias=mandarin-master \
              -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}" 2>&1

            # Build AAB
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/mandarin-master.keystore \
              -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias=mandarin-master \
              -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}" 2>&1 || true
          else
            echo "::warning::No gradlew found. Bubblewrap init may have failed."
            echo "Use PWABuilder web interface: https://www.pwabuilder.com"
          fi

          echo "=== Build outputs ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No artifacts found"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find twa-build -name "*.apk" -exec cp {} artifacts/ \; 2>/dev/null || true
          find twa-build -name "*.aab" -exec cp {} artifacts/ \; 2>/dev/null || true
          cp $GITHUB_WORKSPACE/mandarin-master.keystore artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-apk
          path: artifacts/*.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-aab
          path: artifacts/*.aab
          if-no-files-found: warn

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: artifacts/mandarin-master.keystore
          retention-days: 3

      - name: Build Summary
        run: |
          echo "## TWA Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SHA-256 Fingerprint:** \`${{ steps.fingerprint.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### assetlinks.json content" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat << EOF >> $GITHUB_STEP_SUMMARY
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "app.netlify.mandarin_master.twa",
              "sha256_cert_fingerprints": ["${{ steps.fingerprint.outputs.sha256 }}"]
            }
          }]
          EOF
          echo '```' >> $GITHUB_STEP_SUMMARY
