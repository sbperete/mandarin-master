name: Build TWA (Android APK/AAB)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'
      version_name:
        description: 'Version name'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @nicolo-nicolo/nicolo-bubblewrap@latest 2>/dev/null || npm install -g @nicolo-nicolo/nicolo-bubblewrap@latest 2>/dev/null || npm install -g @nicolo-nicolo/nicolo-bubblewrap@latest 2>/dev/null || npm install -g @nicolo-nicolo/nicolo-bubblewrap@latest 2>/dev/null || npm install -g @nicolo-nicolo/nicolo-bubblewrap@latest 2>/dev/null || npm install -g @bubblewrap/cli

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias mandarin-master \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore ${{ github.workspace }}/mandarin-master.keystore \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Mandarin Master, OU=Apps, O=MandarinMaster, L=Unknown, ST=Unknown, C=US"

      - name: Extract signing fingerprint
        id: fingerprint
        run: |
          FINGERPRINT=$(keytool -list -v \
            -keystore ${{ github.workspace }}/mandarin-master.keystore \
            -alias mandarin-master \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "sha256=$FINGERPRINT" >> $GITHUB_OUTPUT
          echo "::notice::SHA-256 Fingerprint: $FINGERPRINT"
          echo ""
          echo "=========================================="
          echo "UPDATE .well-known/assetlinks.json with:"
          echo "$FINGERPRINT"
          echo "=========================================="

      - name: Initialize TWA project
        run: |
          mkdir -p twa-build && cd twa-build

          # Create twaManifest.json for bubblewrap
          cat > twaManifest.json << EOF
          {
            "packageId": "app.netlify.mandarin_master.twa",
            "host": "mandarin-master.netlify.app",
            "name": "Mandarin Master - Learn Chinese HSK",
            "launcherName": "Mandarin Master",
            "display": "standalone",
            "themeColor": "#0f1520",
            "themeColorDark": "#0f1520",
            "navigationColor": "#0f1520",
            "navigationColorDark": "#0f1520",
            "navigationDividerColor": "#0f1520",
            "navigationDividerColorDark": "#0f1520",
            "backgroundColor": "#0f1520",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://mandarin-master.netlify.app/icons/icon-512.png",
            "maskableIconUrl": "https://mandarin-master.netlify.app/icons/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "${{ github.workspace }}/mandarin-master.keystore",
              "alias": "mandarin-master"
            },
            "appVersionCode": ${{ inputs.version_code }},
            "appVersionName": "${{ inputs.version_name }}",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://mandarin-master.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://mandarin-master.netlify.app/",
            "minSdkVersion": 19,
            "fingerprints": [
              {
                "type": "SHA-256",
                "value": "${{ steps.fingerprint.outputs.sha256 }}"
              }
            ]
          }
          EOF

          # Set ANDROID_HOME for bubblewrap
          export ANDROID_HOME=/usr/local/lib/android/sdk

          # Initialize bubblewrap project (non-interactive)
          echo "y" | bubblewrap init --manifest="https://mandarin-master.netlify.app/manifest.json" 2>&1 || {
            echo "bubblewrap init from manifest failed, trying with local twaManifest..."
            echo "y" | bubblewrap init --manifest=twaManifest.json 2>&1 || true
          }

      - name: Build APK and AAB
        working-directory: twa-build
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk

          # Try bubblewrap build first
          bubblewrap build \
            --signingKeyPath ${{ github.workspace }}/mandarin-master.keystore \
            --signingKeyAlias mandarin-master 2>&1 || {
            echo "bubblewrap build failed, trying gradle directly..."
            if [ -f "gradlew" ]; then
              chmod +x gradlew
              ./gradlew assembleRelease bundleRelease 2>&1 || ./gradlew assembleRelease 2>&1 || true
            fi
          }

          echo "=== Build outputs ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find twa-build -name "*.apk" -exec cp {} artifacts/ \; 2>/dev/null || true
          find twa-build -name "*.aab" -exec cp {} artifacts/ \; 2>/dev/null || true
          cp mandarin-master.keystore artifacts/ 2>/dev/null || true
          echo "=== Artifacts ==="
          ls -la artifacts/

      - name: Upload APK
        if: inputs.build_type == 'apk' || inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-apk
          path: artifacts/*.apk
          if-no-files-found: warn

      - name: Upload AAB
        if: inputs.build_type == 'aab' || inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-aab
          path: artifacts/*.aab
          if-no-files-found: warn

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: mandarin-master.keystore
          retention-days: 1

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SHA-256 Fingerprint:** \`${{ steps.fingerprint.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Download artifacts from this run" >> $GITHUB_STEP_SUMMARY
          echo "2. Update \`.well-known/assetlinks.json\` with the SHA-256 fingerprint above" >> $GITHUB_STEP_SUMMARY
          echo "3. Upload APK/AAB to Google Play Console" >> $GITHUB_STEP_SUMMARY
          echo "4. Upload APK to Amazon Appstore" >> $GITHUB_STEP_SUMMARY
          echo "5. Upload APK to Huawei AppGallery" >> $GITHUB_STEP_SUMMARY
