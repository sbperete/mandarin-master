name: Build TWA (Android APK/AAB)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'
      version_name:
        description: 'Version name'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias mandarin-master \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore $GITHUB_WORKSPACE/mandarin-master.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=Mandarin Master, OU=Apps, O=MandarinMaster, L=Unknown, ST=Unknown, C=US"

      - name: Extract SHA-256 fingerprint
        id: fingerprint
        run: |
          FINGERPRINT=$(keytool -list -v \
            -keystore $GITHUB_WORKSPACE/mandarin-master.keystore \
            -alias mandarin-master \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "sha256=$FINGERPRINT" >> $GITHUB_OUTPUT
          echo "::notice::SHA-256 Fingerprint: $FINGERPRINT"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap to use existing SDK
        run: |
          # Create bubblewrap config to skip SDK download
          mkdir -p $HOME/.aspect
          mkdir -p $HOME/.nicolo-nicolo/nicolo-nicolo/nicolo-bubblewrap
          mkdir -p $HOME/.nicolo-nicolo/nicolo-bubblewrap

          # Tell bubblewrap where the existing JDK and SDK are
          cat > $HOME/.nicolo-nicolo/nicolo-bubblewrap/config.json 2>/dev/null << EOF || true
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          EOF

          # Also try the bubblewrap config location
          mkdir -p $HOME/.nicolo-nicolo/nicolo-bubblewrap
          cat > $HOME/.nicolo-nicolo/nicolo-bubblewrap/config.json 2>/dev/null << EOF || true
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          EOF

          # Try standard config location
          mkdir -p $HOME/.nicolo-nicolo/nicolo-bubblewrap
          cat > $HOME/.nicolo-nicolo/nicolo-bubblewrap/config.json 2>/dev/null << EOF || true
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          EOF

      - name: Initialize and build TWA
        run: |
          mkdir -p twa-build && cd twa-build

          # Set env vars for bubblewrap
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

          # Answer "No" to SDK download question, then provide paths
          printf 'n\n/usr/local/lib/android/sdk\n%s\n' "$JAVA_HOME" | bubblewrap init \
            --manifest="https://mandarin-master.netlify.app/manifest.json" \
            --directory=. 2>&1 || {
            echo "First init attempt failed, trying alternative..."
            echo "n" | bubblewrap init \
              --manifest="https://mandarin-master.netlify.app/manifest.json" 2>&1 || true
          }

          echo "=== Project files after init ==="
          ls -la

      - name: Build APK and AAB
        working-directory: twa-build
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

          if [ -f "twaManifest.json" ] || [ -f "build.gradle" ] || [ -f "gradlew" ]; then
            # If bubblewrap created a project, try building
            if [ -f "gradlew" ]; then
              echo "Building with Gradle..."
              chmod +x gradlew
              ./gradlew assembleRelease 2>&1 || true
              ./gradlew bundleRelease 2>&1 || true
            else
              echo "Trying bubblewrap build..."
              bubblewrap build 2>&1 || true
            fi
          else
            echo "No project was created. Using PWABuilder web interface instead."
            echo "Go to https://www.pwabuilder.com and enter https://mandarin-master.netlify.app"
          fi

          echo "=== Looking for build outputs ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find twa-build -name "*.apk" -exec cp {} artifacts/ \; 2>/dev/null || true
          find twa-build -name "*.aab" -exec cp {} artifacts/ \; 2>/dev/null || true
          cp $GITHUB_WORKSPACE/mandarin-master.keystore artifacts/ 2>/dev/null || true
          echo "=== Collected artifacts ==="
          ls -la artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-apk
          path: artifacts/*.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: mandarin-master-aab
          path: artifacts/*.aab
          if-no-files-found: warn

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: artifacts/mandarin-master.keystore
          retention-days: 3

      - name: Build Summary
        run: |
          echo "## TWA Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SHA-256 Fingerprint:** \`${{ steps.fingerprint.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Update assetlinks.json" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '[{' >> $GITHUB_STEP_SUMMARY
          echo '  "relation": ["delegate_permission/common.handle_all_urls"],' >> $GITHUB_STEP_SUMMARY
          echo '  "target": {' >> $GITHUB_STEP_SUMMARY
          echo '    "namespace": "android_app",' >> $GITHUB_STEP_SUMMARY
          echo '    "package_name": "app.netlify.mandarin_master.twa",' >> $GITHUB_STEP_SUMMARY
          echo '    "sha256_cert_fingerprints": ["${{ steps.fingerprint.outputs.sha256 }}"]' >> $GITHUB_STEP_SUMMARY
          echo '  }' >> $GITHUB_STEP_SUMMARY
          echo '}]' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### If no APK/AAB was produced:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to https://www.pwabuilder.com" >> $GITHUB_STEP_SUMMARY
          echo "2. Enter: https://mandarin-master.netlify.app" >> $GITHUB_STEP_SUMMARY
          echo "3. Click Package → Android" >> $GITHUB_STEP_SUMMARY
          echo "4. Download the APK/AAB and sign with the keystore from artifacts" >> $GITHUB_STEP_SUMMARY
