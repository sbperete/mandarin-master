<!-- =============================================================
     Auth Modal — Mandarin Master
     =============================================================
     USAGE: Copy everything below and paste inside <body> of index.html.
     Depends on: js/auth.js (window.auth must be loaded)
     Exposes:    window.AuthModal
     ============================================================= -->

<!-- AUTH MODAL OVERLAY -->
<div id="auth-modal-overlay" class="am-overlay am-hidden">
    <div class="am-modal" role="dialog" aria-labelledby="am-title" aria-modal="true">

        <!-- Close button -->
        <button class="am-close" id="am-close-btn" aria-label="Close">&times;</button>

        <!-- Header -->
        <div class="am-header">
            <h2 id="am-title">Welcome to Mandarin Master</h2>
            <p class="am-subtitle">Start your Chinese learning journey</p>
        </div>

        <!-- Error display -->
        <div id="auth-error" class="am-error" style="display:none;" role="alert"></div>

        <!-- Social Buttons -->
        <div class="am-social">
            <button class="am-social-btn am-google" id="am-google-btn" type="button">
                <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Continue with Google
            </button>
            <button class="am-social-btn am-facebook" id="am-facebook-btn" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="#fff" d="M24 12.07C24 5.41 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.79-4.7 4.53-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.89v2.26h3.32l-.53 3.5h-2.8V24C19.62 23.1 24 18.1 24 12.07"/></svg>
                Continue with Facebook
            </button>
        </div>

        <!-- Divider -->
        <div class="am-divider"><span>or use email</span></div>

        <!-- Tabs -->
        <div class="am-tabs" role="tablist">
            <button class="am-tab am-tab-active" id="am-tab-signin" role="tab" aria-selected="true" data-tab="signin">Sign In</button>
            <button class="am-tab" id="am-tab-signup" role="tab" aria-selected="false" data-tab="signup">Sign Up</button>
        </div>

        <!-- Sign In Form -->
        <form class="am-form" id="am-form-signin" novalidate>
            <div class="am-field">
                <label for="am-signin-email">Email</label>
                <input type="email" id="am-signin-email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="am-field">
                <label for="am-signin-password">Password</label>
                <input type="password" id="am-signin-password" placeholder="Your password" required minlength="6" autocomplete="current-password">
            </div>
            <button type="submit" class="am-submit" id="am-signin-submit">Sign In</button>
            <button type="button" class="am-link-btn" id="am-forgot-btn">Forgot password?</button>
        </form>

        <!-- Sign Up Form -->
        <form class="am-form am-hidden" id="am-form-signup" novalidate>
            <div class="am-field">
                <label for="am-signup-name">Display Name</label>
                <input type="text" id="am-signup-name" placeholder="Your name" required minlength="2" autocomplete="name">
            </div>
            <div class="am-field">
                <label for="am-signup-email">Email</label>
                <input type="email" id="am-signup-email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="am-field">
                <label for="am-signup-password">Password</label>
                <input type="password" id="am-signup-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="am-submit" id="am-signup-submit">Create Account</button>
        </form>

        <!-- Reset Password Form -->
        <form class="am-form am-hidden" id="am-form-reset" novalidate>
            <p class="am-reset-info">Enter your email and we'll send a reset link.</p>
            <div class="am-field">
                <label for="am-reset-email">Email</label>
                <input type="email" id="am-reset-email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <button type="submit" class="am-submit" id="am-reset-submit">Send Reset Link</button>
            <button type="button" class="am-link-btn" id="am-back-signin-btn">&larr; Back to Sign In</button>
        </form>

        <!-- Footer -->
        <p class="am-footer">Free forever for HSK 1. Premium unlocks all levels.</p>
    </div>
</div>

<!-- AUTH MODAL STYLES (scoped via .am- prefix) -->
<style>
    /* --- Overlay --- */
    .am-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        opacity: 1;
        transition: opacity 0.2s ease;
    }
    .am-overlay.am-hidden {
        display: none;
    }

    /* --- Modal Box --- */
    .am-modal {
        background: #1a1e2e;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        width: 100%;
        max-width: 420px;
        max-height: 90vh;
        overflow-y: auto;
        padding: 32px 28px;
        position: relative;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: am-slide-up 0.25s ease-out;
    }
    @keyframes am-slide-up {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* --- Close Button --- */
    .am-close {
        position: absolute;
        top: 12px;
        right: 16px;
        background: none;
        border: none;
        color: #8892a4;
        font-size: 1.8rem;
        cursor: pointer;
        line-height: 1;
        padding: 4px 8px;
        border-radius: 8px;
        transition: background 0.15s, color 0.15s;
    }
    .am-close:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
    }

    /* --- Header --- */
    .am-header {
        text-align: center;
        margin-bottom: 24px;
    }
    .am-header h2 {
        color: #ecf0f1;
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 4px;
    }
    .am-subtitle {
        color: #8892a4;
        font-size: 0.9rem;
        margin: 0;
    }

    /* --- Error --- */
    .am-error {
        background: rgba(231, 76, 60, 0.15);
        border: 1px solid rgba(231, 76, 60, 0.4);
        color: #e74c3c;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-bottom: 16px;
        text-align: center;
    }

    /* --- Social Buttons --- */
    .am-social {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
    }
    .am-social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 12px 16px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        color: #ecf0f1;
        background: rgba(255, 255, 255, 0.06);
    }
    .am-social-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.12);
        transform: translateY(-1px);
    }
    .am-social-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .am-google:hover:not(:disabled) {
        border-color: #ea4335;
    }
    .am-facebook {
        background: #1877f2;
        border-color: #1877f2;
    }
    .am-facebook:hover:not(:disabled) {
        background: #166fe5;
    }

    /* --- Divider --- */
    .am-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        color: #5a6478;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .am-divider::before,
    .am-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
    }

    /* --- Tabs --- */
    .am-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 3px;
    }
    .am-tab {
        flex: 1;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: #8892a4;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }
    .am-tab:hover {
        color: #ecf0f1;
    }
    .am-tab-active {
        background: rgba(0, 191, 165, 0.2);
        color: #00BFA5;
    }

    /* --- Forms --- */
    .am-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }
    .am-form.am-hidden {
        display: none;
    }
    .am-field label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: #8892a4;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .am-field input {
        width: 100%;
        padding: 11px 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        color: #ecf0f1;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
    }
    .am-field input::placeholder {
        color: #5a6478;
    }
    .am-field input:focus {
        border-color: #00BFA5;
    }
    .am-field input:invalid:not(:placeholder-shown) {
        border-color: #e74c3c;
    }

    /* --- Submit Button --- */
    .am-submit {
        width: 100%;
        padding: 13px 20px;
        background: linear-gradient(135deg, #00BFA5, #2ecc71);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 4px;
    }
    .am-submit:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(0, 191, 165, 0.35);
    }
    .am-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    /* --- Link Buttons --- */
    .am-link-btn {
        background: none;
        border: none;
        color: #00BFA5;
        font-size: 0.85rem;
        cursor: pointer;
        padding: 4px 0;
        text-align: center;
        transition: color 0.15s;
    }
    .am-link-btn:hover {
        color: #2ecc71;
        text-decoration: underline;
    }

    /* --- Reset Info --- */
    .am-reset-info {
        color: #8892a4;
        font-size: 0.9rem;
        text-align: center;
        margin: 0 0 4px;
    }

    /* --- Footer --- */
    .am-footer {
        text-align: center;
        color: #5a6478;
        font-size: 0.8rem;
        margin-top: 20px;
        margin-bottom: 0;
    }

    /* --- Mobile --- */
    @media (max-width: 480px) {
        .am-modal {
            padding: 24px 20px;
            border-radius: 12px;
        }
        .am-header h2 {
            font-size: 1.3rem;
        }
        .am-social-btn {
            font-size: 0.88rem;
            padding: 11px 14px;
        }
    }
</style>

<!-- AUTH MODAL CONTROLLER -->
<script>
(function () {
    'use strict';

    // --- DOM refs ---
    var overlay   = document.getElementById('auth-modal-overlay');
    var closeBtn  = document.getElementById('am-close-btn');
    var tabSignin = document.getElementById('am-tab-signin');
    var tabSignup = document.getElementById('am-tab-signup');
    var formSignin = document.getElementById('am-form-signin');
    var formSignup = document.getElementById('am-form-signup');
    var formReset  = document.getElementById('am-form-reset');
    var forgotBtn  = document.getElementById('am-forgot-btn');
    var backBtn    = document.getElementById('am-back-signin-btn');
    var googleBtn  = document.getElementById('am-google-btn');
    var facebookBtn = document.getElementById('am-facebook-btn');
    var tabs       = document.querySelector('.am-tabs');

    // --- Show / Hide ---

    function show(initialTab) {
        overlay.classList.remove('am-hidden');
        document.body.style.overflow = 'hidden';
        if (initialTab === 'signup') {
            switchTab('signup');
        } else {
            switchTab('signin');
        }
        // Focus first input after animation
        setTimeout(function () {
            var active = overlay.querySelector('.am-form:not(.am-hidden) input');
            if (active) active.focus();
        }, 100);
    }

    function hide() {
        overlay.classList.add('am-hidden');
        document.body.style.overflow = '';
        if (window.auth) window.auth.clearError();
    }

    // --- Tabs ---

    function switchTab(tab) {
        if (window.auth) window.auth.clearError();

        formSignin.classList.add('am-hidden');
        formSignup.classList.add('am-hidden');
        formReset.classList.add('am-hidden');
        tabs.style.display = '';

        tabSignin.classList.remove('am-tab-active');
        tabSignin.setAttribute('aria-selected', 'false');
        tabSignup.classList.remove('am-tab-active');
        tabSignup.setAttribute('aria-selected', 'false');

        if (tab === 'signup') {
            formSignup.classList.remove('am-hidden');
            tabSignup.classList.add('am-tab-active');
            tabSignup.setAttribute('aria-selected', 'true');
        } else if (tab === 'reset') {
            formReset.classList.remove('am-hidden');
            tabs.style.display = 'none'; // hide tabs on reset view
        } else {
            formSignin.classList.remove('am-hidden');
            tabSignin.classList.add('am-tab-active');
            tabSignin.setAttribute('aria-selected', 'true');
        }
    }

    // --- Handlers ---

    async function handleSignIn(e) {
        e.preventDefault();
        if (!window.auth) return;

        var email = document.getElementById('am-signin-email').value.trim();
        var password = document.getElementById('am-signin-password').value;
        var btn = document.getElementById('am-signin-submit');

        if (!email || !password) {
            window.auth.showError('Please fill in all fields.');
            return;
        }

        window.auth.setLoading(btn, true);
        try {
            await window.auth.signIn(email, password);
            hide();
        } catch (err) {
            // error already shown by auth.signIn
        } finally {
            window.auth.setLoading(btn, false);
        }
    }

    async function handleSignUp(e) {
        e.preventDefault();
        if (!window.auth) return;

        var name = document.getElementById('am-signup-name').value.trim();
        var email = document.getElementById('am-signup-email').value.trim();
        var password = document.getElementById('am-signup-password').value;
        var btn = document.getElementById('am-signup-submit');

        if (!name || !email || !password) {
            window.auth.showError('Please fill in all fields.');
            return;
        }
        if (password.length < 6) {
            window.auth.showError('Password must be at least 6 characters.');
            return;
        }

        window.auth.setLoading(btn, true);
        try {
            await window.auth.signUp(email, password, name);
            window.auth.clearError();
            // Supabase may require email confirmation depending on project settings.
            // Show success message instead of auto-closing.
            var errorEl = document.getElementById('auth-error');
            if (errorEl) {
                errorEl.style.display = 'block';
                errorEl.style.background = 'rgba(46, 204, 113, 0.15)';
                errorEl.style.borderColor = 'rgba(46, 204, 113, 0.4)';
                errorEl.style.color = '#2ecc71';
                errorEl.textContent = 'Account created! Check your email to confirm, then sign in.';
            }
            switchTab('signin');
        } catch (err) {
            // error already shown by auth.signUp
        } finally {
            window.auth.setLoading(btn, false);
        }
    }

    async function handleReset(e) {
        e.preventDefault();
        if (!window.auth) return;

        var email = document.getElementById('am-reset-email').value.trim();
        var btn = document.getElementById('am-reset-submit');

        if (!email) {
            window.auth.showError('Please enter your email.');
            return;
        }

        window.auth.setLoading(btn, true);
        try {
            await window.auth.resetPassword(email);
            window.auth.clearError();
            var errorEl = document.getElementById('auth-error');
            if (errorEl) {
                errorEl.style.display = 'block';
                errorEl.style.background = 'rgba(46, 204, 113, 0.15)';
                errorEl.style.borderColor = 'rgba(46, 204, 113, 0.4)';
                errorEl.style.color = '#2ecc71';
                errorEl.textContent = 'Reset link sent! Check your inbox.';
            }
        } catch (err) {
            // error already shown by auth.resetPassword
        } finally {
            window.auth.setLoading(btn, false);
        }
    }

    // --- Social handlers ---

    function handleGoogle() {
        if (!window.auth) return;
        window.auth.setLoading(googleBtn, true);
        window.auth.signInWithGoogle().catch(function () {
            window.auth.setLoading(googleBtn, false);
        });
        // If OAuth redirects, the page unloads so no need to reset button
    }

    function handleFacebook() {
        if (!window.auth) return;
        window.auth.setLoading(facebookBtn, true);
        window.auth.signInWithFacebook().catch(function () {
            window.auth.setLoading(facebookBtn, false);
        });
    }

    // --- Event Bindings ---

    closeBtn.addEventListener('click', hide);

    // Close on overlay click (not modal body)
    overlay.addEventListener('click', function (e) {
        if (e.target === overlay) hide();
    });

    // Close on ESC
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !overlay.classList.contains('am-hidden')) {
            hide();
        }
    });

    // Tabs
    tabSignin.addEventListener('click', function () { switchTab('signin'); });
    tabSignup.addEventListener('click', function () { switchTab('signup'); });
    forgotBtn.addEventListener('click', function () { switchTab('reset'); });
    backBtn.addEventListener('click', function () { switchTab('signin'); });

    // Forms
    formSignin.addEventListener('submit', handleSignIn);
    formSignup.addEventListener('submit', handleSignUp);
    formReset.addEventListener('submit', handleReset);

    // Social
    googleBtn.addEventListener('click', handleGoogle);
    facebookBtn.addEventListener('click', handleFacebook);

    // Auto-hide modal when auth succeeds (from OAuth redirect or session restore)
    window.addEventListener('auth-state-changed', function (e) {
        if (e.detail && e.detail.user) {
            hide();
        }
    });

    // --- Public API ---
    window.AuthModal = {
        show: show,
        hide: hide
    };
})();
</script>
