<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Mandarin Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #1a1e2e 50%, #0d1117 100%);
            color: #ecf0f1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        .error-character {
            font-size: 8rem;
            line-height: 1;
            margin-bottom: 16px;
            opacity: 0.9;
        }
        .error-code {
            font-size: 1.2rem;
            color: #00BFA5;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            font-weight: 700;
        }
        p {
            color: #8892a4;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .home-btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #00BFA5, #2ecc71);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 191, 165, 0.3);
        }
        .fun-fact {
            margin-top: 40px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            font-size: 0.85rem;
            color: #8892a4;
        }
        .fun-fact strong { color: #00BFA5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-character">迷</div>
        <div class="error-code">404 — Page Not Found</div>
        <h1>You seem lost!</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="home-btn">Back to Learning</a>
        <div class="fun-fact">
            <strong>Fun fact:</strong> The character above is <strong>迷 (mi)</strong> meaning "lost" or "confused" — now you've learned a new word!
        </div>
    </div>
</body>
</html>
