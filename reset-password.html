<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Mandarin Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%);
            color: #ecf0f1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .reset-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(to right, #00BFA5, #2ecc71);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #8892a4;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #8892a4;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #ecf0f1;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #00BFA5; }
        .submit-btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #00BFA5, #2ecc71);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,191,165,0.35);
        }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }
        .message.error {
            display: block;
            background: rgba(231,76,60,0.15);
            border: 1px solid rgba(231,76,60,0.4);
            color: #e74c3c;
        }
        .message.success {
            display: block;
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.4);
            color: #2ecc71;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #00BFA5;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="reset-card">
        <h1>Mandarin Master</h1>
        <p class="subtitle">Set your new password</p>
        <div id="message" class="message"></div>
        <form id="reset-form">
            <div class="field">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="field">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Re-enter password" required minlength="6">
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Update Password</button>
        </form>
        <a href="/" class="back-link">Back to Mandarin Master</a>
    </div>

    <script src="js/supabase.js"></script>
    <script>
    (function() {
        'use strict';
        var form = document.getElementById('reset-form');
        var msg = document.getElementById('message');
        var btn = document.getElementById('submit-btn');

        function showMsg(text, type) {
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        // Check if we have a valid recovery session
        if (!window.supabaseClient) {
            showMsg('Error: Could not connect to authentication service.', 'error');
            return;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            var pw = document.getElementById('new-password').value;
            var confirm = document.getElementById('confirm-password').value;

            if (pw.length < 6) {
                showMsg('Password must be at least 6 characters.', 'error');
                return;
            }
            if (pw !== confirm) {
                showMsg('Passwords do not match.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                var result = await window.supabaseClient.auth.updateUser({ password: pw });
                if (result.error) throw result.error;
                showMsg('Password updated successfully! Redirecting...', 'success');
                form.style.display = 'none';
                setTimeout(function() { window.location.href = '/'; }, 2000);
            } catch (err) {
                showMsg(err.message || 'Failed to update password. The link may have expired.', 'error');
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        });
    })();
    </script>
</body>
</html>
